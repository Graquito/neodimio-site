steps:
  - id: install
    name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  - id: build
    name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'storage'
      - 'rsync'
      - '--recursive'
      - '--delete-unmatched-destination-objects'
      - './dist'
      - 'gs://neodimio-site-prod'

  - id: invalidate-cdn
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'compute'
      - 'url-maps'
      - 'invalidate-cdn-cache'
      - 'neodimio-site-url-map'
      - '--path=/*'
      - '--global'
      - '--async'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'
